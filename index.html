<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalkulator Waris Perdata - Adien</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f10; --card-color: #1c1c1e; --accent-gold: #ffd700;
            --accent-blue: #4e95ff; --text-main: #e3e3e3; --text-dim: #b4b4b4;
            --border: #333333; --island-bg: #2f2f30;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        .island { width: 140px; height: 32px; background: var(--island-bg); border-radius: 100px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; font-weight: 700; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .island-active { width: 280px; height: 40px; background: linear-gradient(90deg, #b388ff, #4e95ff); }

        .container { background: var(--card-color); padding: 25px; border-radius: 35px; width: 92%; max-width: 480px; height: 90vh; border: 1px solid var(--border); display: flex; flex-direction: column; position: relative; }
        .scroll-area { overflow-y: auto; flex-grow: 1; padding-right: 5px; }
        .scroll-area::-webkit-scrollbar { width: 4px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .field { margin-bottom: 15px; }
        label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; display: block; margin-bottom: 6px; letter-spacing: 0.5px; }
        input { width: 100%; padding: 12px; border: 1px solid #444; border-radius: 12px; background: #000; color: white; outline: none; font-size: 15px; }

        .section-title { font-size: 12px; font-weight: 700; color: var(--accent-blue); margin: 15px 0 10px; display: flex; align-items: center; gap: 8px; }
        .grid-kloving { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 20px; border: 1px solid #333; }

        .btn-calc { width: 100%; padding: 16px; background: #fff; color: #000; border: none; border-radius: 100px; font-weight: 800; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .btn-calc:hover { background: var(--accent-gold); }

        .results { margin-top: 20px; display: none; animation: slideUp 0.5s ease; }
        .uraian-card { background: rgba(78, 149, 255, 0.05); padding: 20px; border-radius: 20px; border: 1px solid rgba(78,149,255,0.2); font-size: 13px; line-height: 1.6; }
        .highlight { color: var(--accent-gold); font-weight: 700; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="welcome" class="overlay">
        <div style="background: var(--card-color); padding: 30px; border-radius: 30px; text-align: center; max-width: 350px; border: 1px solid #333;">
            <h2 style="color: var(--accent-gold);">Waris Expert V3</h2>
            <p style="font-size: 14px; color: var(--text-dim); margin: 15px 0;">Sistem Logika Kloving Aktif.<br>Kalkulasi Golongan I - IV Terintegrasi.</p>
            <button class="btn-calc" onclick="document.getElementById('welcome').style.display='none'">Mulai Hitung</button>
        </div>
    </div>

    <div class="container">
        <div class="island" id="island">WARIS LOGIC</div>
        
        <div class="scroll-area">
            <div class="field">
                <label>Harta Peninggalan Bersih (Rp)</label>
                <input type="text" id="dispHarta" placeholder="Rp 0" oninput="fmtRp(this)">
                <input type="hidden" id="rawHarta">
            </div>

            <div class="section-title"><span>—</span> KELUARGA INTI / GOL II</div>
            <div class="grid-kloving" style="grid-template-columns: 1fr;">
                <input type="number" id="valSI" placeholder="Istri / Suami (Hidup Terlama)" style="margin-bottom:8px">
                <input type="number" id="valAnak" placeholder="Jumlah Anak Kandung" style="margin-bottom:8px">
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="valOT" placeholder="Jml Orang Tua">
                    <input type="number" id="valSK" placeholder="Jml Saudara">
                </div>
            </div>

            <div class="section-title"><span>—</span> SISTEM KLOVING (GOL III & IV)</div>
            <div class="grid-kloving">
                <div>
                    <label>Garis Ayah</label>
                    <input type="number" id="aG3" placeholder="Kakek/Nenek" style="margin-bottom:5px">
                    <input type="number" id="aG4" placeholder="Paman/Bibi">
                </div>
                <div>
                    <label>Garis Ibu</label>
                    <input type="number" id="iG3" placeholder="Kakek/Nenek" style="margin-bottom:5px">
                    <input type="number" id="iG4" placeholder="Paman/Bibi">
                </div>
            </div>

            <button class="btn-calc" onclick="calculate()">HITUNG ANALISA HUKUM</button>

            <div id="resArea" class="results">
                <div class="uraian-card" id="uraian"></div>
            </div>
            <div style="height: 30px;"></div>
        </div>
    </div>

    <script>
        function fmtRp(e) {
            let v = e.value.replace(/[^,\d]/g, '');
            document.getElementById('rawHarta').value = v;
            if (v) e.value = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(v);
        }

        function calculate() {
            const harta = parseFloat(document.getElementById('rawHarta').value) || 0;
            if (harta <= 0) return;

            const si = parseInt(document.getElementById('valSI').value) || 0;
            const ak = parseInt(document.getElementById('valAnak').value) || 0;
            const ot = parseInt(document.getElementById('valOT').value) || 0;
            const sk = parseInt(document.getElementById('valSK').value) || 0;
            
            const f = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n);
            const isl = document.getElementById('island');
            isl.classList.add('island-active');
            isl.innerText = "KLOVING ANALYSIS IN PROGRESS...";

            setTimeout(() => {
                let res = "";

                if (ak > 0) {
                    let p = harta / (si + ak);
                    res = `Analisa <span class="highlight">Golongan I</span>: Keberadaan anak menutup seluruh garis lainnya. Harta dibagi rata.<br>• Porsi per orang: <span class="highlight">${f(p)}</span>`;
                } 
                else if (si > 0 || ot > 0 || sk > 0) {
                    if (si > 0 && (ot > 0 || sk > 0)) {
                        let pRata = harta / (si + ot + sk);
                        let minOT = harta * 0.25;
                        if (ot > 0 && pRata < minOT) {
                            let sisa = harta - (minOT * ot);
                            res = `Analisa <span class="highlight">Mewarisi Bersama</span>: Pasangan berbagi dengan Gol II. Orang tua dijamin hak minimal 1/4.<br>• Orang Tua: <span class="highlight">${f(minOT)}</span><br>• Pasangan & Saudara: <span class="highlight">${f(sisa/(si+sk))}</span>`;
                        } else {
                            res = `Harta dibagi rata kepada Pasangan, Orang Tua, dan Saudara sebesar <span class="highlight">${f(pRata)}</span>.`;
                        }
                    } else if (si > 0) {
                        res = `Seluruh harta <span class="highlight">${f(harta)}</span> jatuh ke tangan Pasangan.`;
                    } else {
                        let pRata = harta / (ot + sk);
                        let minOT = harta * 0.25;
                        if (ot > 0 && pRata < minOT) {
                            res = `Golongan II: Orang Tua dapat 1/4 (<span class="highlight">${f(minOT)}</span>), sisanya untuk Saudara (<span class="highlight">${f((harta-(minOT*ot))/sk)}</span>).`;
                        } else {
                            res = `Harta dibagi rata kepada Golongan II sebesar <span class="highlight">${f(pRata)}</span>.`;
                        }
                    }
                } 
                else {
                    // LOGIKA KLOVING BERSAMA
                    let belah = harta / 2;
                    let a3 = parseInt(document.getElementById('aG3').value) || 0;
                    let a4 = parseInt(document.getElementById('aG4').value) || 0;
                    let i3 = parseInt(document.getElementById('iG3').value) || 0;
                    let i4 = parseInt(document.getElementById('iG4').value) || 0;

                    res = `Sistem <span class="highlight">Kloving</span> Aktif (Garis Ayah & Ibu):<br><br>`;
                    
                    // Sisi Ayah
                    if (a3 > 0) res += `• Sisi Ayah (Gol III): <span class="highlight">${f(belah/a3)}</span> per orang.<br>`;
                    else if (a4 > 0) res += `• Sisi Ayah (Gol IV): <span class="highlight">${f(belah/a4)}</span> per orang.<br>`;
                    else res += `• Sisi Ayah: Tidak ada ahli waris.<br>`;

                    // Sisi Ibu
                    if (i3 > 0) res += `• Sisi Ibu (Gol III): <span class="highlight">${f(belah/i3)}</span> per orang.<br>`;
                    else if (i4 > 0) res += `• Sisi Ibu (Gol IV): <span class="highlight">${f(belah/i4)}</span> per orang.<br>`;
                    else res += `• Sisi Ibu: Tidak ada ahli waris.<br>`;
                }

                document.getElementById('uraian').innerHTML = res;
                document.getElementById('resArea').style.display = 'block';
                isl.innerText = "SUCCESS ✨";
                setTimeout(() => { isl.classList.remove('island-active'); isl.innerText = "WARIS LOGIC"; }, 1500);
            }, 1000);
        }
    </script>
</body>
</html>
